spring:
  application:
    name: spring-ai-rag-demo

  # Virtual threads (Java 21+) for the blocking web/JDBC workload
  threads:
    virtual:
      enabled: true

  # RFC 9457 ProblemDetail error responses
  mvc:
    problemdetails:
      enabled: true

  # Docker Compose integration
  docker:
    compose:
      lifecycle-management: START_ONLY

  # File upload configuration
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  # Database configuration (for chat memory)
  datasource:
    url: jdbc:postgresql://localhost:5432/ragdemo
    username: user
    password: password

  # Spring AI Configuration
  ai:
    # OpenAI settings
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        model: gpt-4o-mini
        temperature: 0.7

    # Vector store settings
    vectorstore:
      pgvector:
        initialize-schema: true
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 1536

    # Chat memory settings
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: ALWAYS

# Server configuration
server:
  port: 8080

# Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

# Logging
logging:
  level:
    "[org.springframework.ai]": INFO
    "[com.arvindand.rag]": DEBUG

